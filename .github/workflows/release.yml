name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — build and scan without pushing or releasing"
        type: boolean
        default: true

# Minimal default permissions — each job escalates only what it needs.
permissions:
  contents: read

jobs:
  # ── 1. Reuse the same CI checks that run on every PR ────────────────────────
  ci:
    name: CI (lint / test / audit)
    uses: ./.github/workflows/ci.yml

  # ── 2. Secret scan across full git history ───────────────────────────────────
  scan-secrets:
    name: Secret scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # full history required by Gitleaks
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 3. Docker: build → scan → push ──────────────────────────────────────────
  docker:
    name: Docker build, scan & push
    needs: [ci, scan-secrets]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Cosign keyless signing via OIDC
    outputs:
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: reachfive/fake-api-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      # Build locally first so Wiz can scan before anything is pushed.
      - name: Build image for scanning
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: devops/docker/dockerfile-fakeapi
          load: true
          tags: reachfive/fake-api-server:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities (Wiz)
        run: |
          curl -Lo wizcli https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64
          chmod +x wizcli
          ./wizcli auth --id "$WIZ_CLIENT_ID" --secret "$WIZ_CLIENT_SECRET"
          ./wizcli docker scan --image reachfive/fake-api-server:scan --policy "Default vulnerabilities policy"
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}

      - name: Log in to Docker Hub
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_DEPLOYER }}

      # Multi-platform push with OCI SBOM + provenance attestations.
      - name: Build and push (multi-platform)
        id: push
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: devops/docker/dockerfile-fakeapi
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Keyless image signing — verifiable without managing private keys.
      - name: Install Cosign
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: Sign image (Sigstore keyless)
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        run: cosign sign --yes reachfive/fake-api-server@${{ steps.push.outputs.digest }}

  # ── 4. GitHub Release ────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [docker]
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          generate_release_notes: true
          make_latest: true
