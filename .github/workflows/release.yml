name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — build and scan without pushing or releasing"
        type: boolean
        default: true

# Minimal default permissions — each job escalates only what it needs.
permissions:
  contents: read

jobs:
  # ── 1. Reuse the same CI checks that run on every PR ────────────────────────
  ci:
    name: CI (lint / test / audit)
    uses: ./.github/workflows/ci.yml

  # ── 2. Secret scan across full git history ───────────────────────────────────
  scan-secrets:
    name: Secret scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history required by Gitleaks
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 3. Docker: build → scan → push ──────────────────────────────────────────
  docker:
    name: Docker build, scan & push
    needs: [ci, scan-secrets]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload Trivy SARIF to GitHub Security tab
      id-token: write # Cosign keyless signing via OIDC
    outputs:
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: reachfive/fake-api-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      # Build locally first so Trivy can scan before anything is pushed.
      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: devops/docker/dockerfile-fakeapi
          load: true
          tags: reachfive/fake-api-server:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities (Trivy)
        id: trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: reachfive/fake-api-server:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true # only fail on fixable CVEs
          exit-code: "1"

      # Upload even if the scan step failed so results are always visible.
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Log in to Docker Hub
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_DEPLOYER }}

      # Multi-platform push with OCI SBOM + provenance attestations.
      - name: Build and push (multi-platform)
        id: push
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: devops/docker/dockerfile-fakeapi
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Keyless image signing — verifiable without managing private keys.
      - name: Install Cosign
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        uses: sigstore/cosign-installer@v3

      - name: Sign image (Sigstore keyless)
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        run: cosign sign --yes reachfive/fake-api-server@${{ steps.push.outputs.digest }}

  # ── 4. GitHub Release ────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [docker]
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
