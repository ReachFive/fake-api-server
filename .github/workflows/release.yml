name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — build and scan without pushing or releasing"
        type: boolean
        default: true

# Minimal default permissions — each job escalates only what it needs.
permissions:
  contents: read

jobs:
  # ── 1. Reuse the same CI checks that run on every PR ────────────────────────
  ci:
    name: CI (lint / test / audit)
    uses: ./.github/workflows/ci.yml

  # ── 2. Secret scan across full git history ───────────────────────────────────
  scan-secrets:
    name: Secret scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history required by Gitleaks
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 3. Docker: build → scan → push ──────────────────────────────────────────
  docker:
    name: Docker build, scan & push
    needs: [ci, scan-secrets]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Cosign keyless signing via OIDC
    outputs:
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: reachfive/fake-api-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      # Build locally first so Wiz can scan before anything is pushed.
      - name: Build image for scanning
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: devops/docker/dockerfile-fakeapi
          load: true
          tags: reachfive/fake-api-server:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities (Wiz)
        run: |
          curl -Lo wizcli https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64
          chmod +x wizcli
          ./wizcli auth --id "$WIZ_CLIENT_ID" --secret "$WIZ_CLIENT_SECRET"
          ./wizcli docker scan --image reachfive/fake-api-server:scan --policy "Default vulnerabilities policy"
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}

      - name: Log in to Docker Hub
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_DEPLOYER }}

      # Multi-platform push with OCI SBOM + provenance attestations.
      - name: Build and push (multi-platform)
        id: push
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: devops/docker/dockerfile-fakeapi
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Keyless image signing — verifiable without managing private keys.
      - name: Install Cosign
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image (Sigstore keyless)
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        run: cosign sign --yes reachfive/fake-api-server@${{ steps.push.outputs.digest }}

  # ── 4. GitHub Release ────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [docker]
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@2bb465e97f322d3cb2a965294d483e0d26a67aa9 # v3.0.1
        with:
          generate_release_notes: true
          make_latest: true
